name: Naukri Auto-Apply

on:
  schedule:
    # Runs every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch: # Allows you to manually trigger it from the GitHub UI

jobs:
  run-auto-apply:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install Dependencies
      run: |
        npm ci
        npx playwright install --with-deps chromium

    - name: Run Job Assistant
      env:
        NAUKRI_EMAIL: ${{ secrets.NAUKRI_EMAIL }}
        NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
        EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
        JOB_KEYWORD: ${{ secrets.JOB_KEYWORD }}
        CITIES: ${{ secrets.CITIES }}
        # The environment variable below tells Playwright to run in headless mode
        GITHUB_ACTIONS: true
      run: node index_runner.js
